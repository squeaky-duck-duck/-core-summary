    --yellow: #c9a06f;
    --orange: #b3714f;
    --text: #403a34;

    --radius: 12px;
    --radius-sm: 8px;
    --serif: 'EB Garamond', 'Cormorant Garamond', Garamond, Georgia, 'Times New Roman', serif;

  body {

  /* ── HEADER ── */

    padding: 54px 32px 36px;

  .header-tag {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .header h1 {

    font-weight: 500;
    letter-spacing: .5px;
    line-height: 1.1;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin: 10px auto 0;
    color: var(--accent);
    font-style: italic;
    font-size: clamp(16px, 2.2vw, 19px);
    max-width: 560px;
  }

  /* ── STAT STRIP ── */
  .stat-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    margin-top: 26px;
  }
  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stat-chip .val {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .stat-chip .lbl {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }
  /* ── MAIN LAYOUT ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 32px; }

  /* ── SECTION TITLES ── */
  .section-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border2), transparent);
  }

  /* ── CATEGORY BARS ── */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
  }
  .cat-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 3px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .cat-bar:hover, .cat-bar.active {
    border-color: var(--accent-soft, var(--accent));
    border-top-color: var(--accent);
    background: var(--card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(120,100,80,.10);
  }
  .cat-bar-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .cat-name { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .cat-count {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }
  .cat-progress-bg {
    height: 4px;
    background: var(--bg2);
    border-radius: 2px;
    overflow: hidden;
  }
  .cat-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* ── CHARTS ROW ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }
  @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }

  .chart-card {

    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .chart-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 13px; color: var(--text-muted); width: 90px; flex-shrink: 0; text-align: right; }
  .bar-wrap { flex: 1; background: var(--bg2); border-radius: 4px; height: 20px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; transition: width 0.8s ease; }
  .bar-fill span { font-size: 12px; font-weight: 600; color: #ffffff; }

  /* donut */
  .donut-wrap { display: flex; align-items: center; gap: 24px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── TOP REACTED ── */
  .spotlight-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .spotlight-card {

    box-shadow: 0 8px 22px rgba(120,100,80,.10);
  }
  .spotlight-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; color: #fff;
    flex-shrink: 0;

  .spotlight-name { font-weight: 600; font-size: 16px; }
  .spotlight-handle { font-size: 12px; color: var(--text-muted); }
  .spotlight-content {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .reaction-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .reaction-chip {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 13px;
    font-style: italic;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 4px;

  /* ── MEMBER GRID ── */
  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(247,243,236,.92);
    backdrop-filter: blur(8px);
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;

  .search-input {

    font-family: var(--serif);

    border: 1px solid var(--border2);

    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;

    color: var(--text-muted);

    font-style: italic;
    color: var(--text-dim);
    margin-left: auto;
    white-space: nowrap;

    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;

  .member-card {

    border: 1px solid var(--border);
    border-top: 3px solid var(--border2);
    border-radius: var(--radius);
    padding: 18px;

function slugCat(c) {
  return c.toLowerCase().replace(/[^a-z]/g, '-').replace(/-+/g, '-');
}

function initials(name) {
  return name.split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';
}

function avatarColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xffffffff;
  const hue = Math.abs(h) % 360;
  return `hsl(${hue}, 32%, 52%)`;
}

function renderBar(container, data, maxVal, colorFn) {
  container.innerHTML = '';
  data.forEach(([label, count]) => {
    const pct = Math.round((count / maxVal) * 100);
    const color = colorFn ? colorFn(label) : '#a690b3';
    container.innerHTML += `<div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"><span>${count}</span></div></div>
    </div>`;
  });
}

function langColor(l) {
  const c = {'English':'#7f9bb3','Hindi':'#b3809c','French':'#c9a06f','Spanish':'#8aa98c','Arabic':'#9483a8','Portuguese':'#b3714f','Russian':'#6e9a94'};
  return c[l] || '#a690b3';
}

let currentFilter = 'all';
let currentSearch = '';
let currentSort = 'newest';

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.cat-bar').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  renderMembers();
}

function setSort(order) {
  currentSort = order;
  const grid = document.getElementById('memberGrid');
  const cards = [...grid.querySelectorAll('.member-card')];
  cards.sort((a, b) => {
    const ta = new Date(a.dataset.timestamp).getTime();
    const tb = new Date(b.dataset.timestamp).getTime();
    return currentSort === 'newest' ? tb - ta : ta - tb;
  });
  cards.forEach(c => grid.appendChild(c));
}

function renderMembers() {
  const grid = document.getElementById('memberGrid');
  const noRes = document.getElementById('noResults');
  const q = currentSearch.toLowerCase();
  const cards = grid.querySelectorAll('.member-card');
  let shown = 0;
  cards.forEach(card => {
    const matchCat = currentFilter === 'all' || (card.dataset.cats || '').includes(currentFilter);
    const matchQ = !q || card.dataset.search.includes(q);
    const show = matchCat && matchQ;
    card.classList.toggle('hidden', !show);
    if (show) shown++;
  });
  document.getElementById('resultsCount').textContent = `${shown} member${shown !== 1 ? 's' : ''}`;
  noRes.classList.toggle('hidden', shown > 0);
}

function buildMemberCard(m) {
  const name = m.name || m.display_name || m.discord_username || 'Anonymous';
  const handle = m.discord_username !== name ? '@' + m.discord_username : '';
  const cats = m.categories || ['Other'];
  const tagHtml = cats.map(c => `<span class="tag tag-${slugCat(c)}">${c}</span>`).join('');
  const bio = m.content.slice(0, 180).replace(/\n/g, ' ') + (m.content.length > 180 ? '\u2026' : '');
  const tz = m.timezone ? `Timezone: ${m.timezone}` : '';
  const lang = m.languages ? `Languages: ${m.languages.slice(0,40)}` : '';
  const reacts = m.total_reactions > 0 ? `${m.total_reactions} reaction${m.total_reactions !== 1 ? 's' : ''}` : '';
  const color = avatarColor(m.author_id || name);
  const searchKey = [name, m.discord_username, m.content, m.background || ''].join(' ').toLowerCase().replace(/"/g, '');
  return `<div class="member-card" data-cats="${cats.join('|')}" data-search="${searchKey}" data-timestamp="${m.timestamp}">
    <div class="member-top">
      <div class="avatar" style="background:linear-gradient(135deg,${color},${color}99)">${initials(name)}</div>
      <div class="member-info"><div class="name">${name}</div><div class="handle">${handle}</div></div>
    </div>
    <div class="member-bio">${bio}</div>
    <div class="member-tags">${tagHtml}</div>
    <div class="member-meta">
      ${tz ? `<span>${tz}</span>` : ''}
      ${lang ? `<span>${lang}</span>` : ''}
      ${reacts ? `<span>${reacts}</span>` : ''}
    </div>
  </div>`;
}

(function() {
  const stats = DATA.stats;
  const meta = DATA.meta;

  // STAT STRIP
  const strip = document.getElementById('statStrip');
  strip.innerHTML = `
    <div class="stat-chip"><div><div class="val">${Object.keys(stats.languages).length}</div><div class="lbl">Languages</div></div></div>
    <div class="stat-chip"><div><div class="val">${Object.keys(stats.timezones).length}</div><div class="lbl">Time Zones</div></div></div>`;

  // CATEGORY BARS
  const maxCat = Math.max(...Object.values(stats.categories));
  const catGrid = document.getElementById('catGrid');
  Object.entries(stats.categories).forEach(([cat, count]) => {
    const pct = Math.round((count / maxCat) * 100);
    const slug = slugCat(cat);
    catGrid.innerHTML += `<div class="cat-bar" data-cat="${cat}" onclick="setFilter('${cat}', null)">
      <div class="cat-bar-top">
        <div class="cat-name">${cat}</div>
        <div class="cat-count">${count}</div>
      </div>
      <div class="cat-progress-bg"><div class="cat-progress-fill fill-${slug}" style="width:${pct}%"></div></div>
    </div>`;
  });

  // LANG CHART
  const langs = Object.entries(stats.languages).slice(0,10);
  renderBar(document.getElementById('langChart'), langs, langs[0][1], langColor);

  // TZ CHART
  const tzs = Object.entries(stats.timezones).slice(0,10);
  renderBar(document.getElementById('tzChart'), tzs, tzs[0][1], () => '#9483a8');

  // SPOTLIGHT
  const spotGrid = document.getElementById('spotlightGrid');
  stats.most_reacted.slice(0,6).forEach(m => {
    const color = avatarColor(m.display_name);
    spotGrid.innerHTML += `<div class="spotlight-card">
      <div class="spotlight-header">
        <div class="avatar" style="background:linear-gradient(135deg,${color},${color}99)">${initials(m.display_name)}</div>
        <div><div class="spotlight-name">${m.display_name}</div><div class="spotlight-handle">@${m.discord_username || ''}</div></div>
      </div>
      <div class="spotlight-content">${m.content.replace(/\n/g,' ')}</div>
      <div class="reaction-chips"><span class="reaction-chip">${m.reactions} reaction${m.reactions !== 1 ? 's' : ''} total</span></div>
    </div>`;
  });

  // MEMBERS
  const memberGrid = document.getElementById('memberGrid');
  memberGrid.innerHTML = DATA.members.map(buildMemberCard).join('');
  document.getElementById('resultsCount').textContent = `${DATA.members.length} members`;
  setSort(currentSort);

  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value;
    renderMembers();
  });
})();
</script>
